<meta charset="UTF-8" />
<link rel="icon" type="image/svg+xml" href="./favicon.svg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- SEO Meta Tags -->
<meta name="description" content="{{description}}" />
<meta name="keywords" content="{{keywords}}" />
<meta name="author" content="Andrea Rinaldi" />

<!-- Open Graph -->
<meta property="og:type" content="{{ogType}}" />
<meta property="og:title" content="{{ogTitle}}" />
<meta property="og:description" content="{{ogDescription}}" />
<meta property="og:url" content="{{ogUrl}}" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{twitterTitle}}" />

<!-- Prevent theme flash -->
<script>
  (function() {
    const s = localStorage.getItem('theme');
    const p = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    const t = s || p;
    document.documentElement.setAttribute('data-theme', t);
    document.documentElement.classList.add(t);
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,700;1,400&family=Lora:wght@400;600&display=swap">
