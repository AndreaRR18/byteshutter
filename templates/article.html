<!doctype html>
<html lang="en">
<head>
  <!-- HEAD -->
  <title><!-- TITLE --></title>
</head>
<body>
  <!-- HEADER -->

  <main id="main-content">

    <!-- Loading skeleton -->
    <div id="article-skeleton" class="article-content">
      <div class="skeleton-header">
        <div class="skeleton-title-lg"></div>
        <div class="skeleton-meta"></div>
      </div>
      <div class="skeleton-content">
        <div class="skeleton-paragraph">
          <div class="skeleton-text"></div>
          <div class="skeleton-text"></div>
          <div class="skeleton-text short"></div>
        </div>
        <div class="skeleton-paragraph">
          <div class="skeleton-text"></div>
          <div class="skeleton-text"></div>
          <div class="skeleton-text short"></div>
        </div>
        <div class="skeleton-paragraph">
          <div class="skeleton-text"></div>
          <div class="skeleton-text short"></div>
        </div>
      </div>
    </div>

    <!-- Error state (hidden by default) -->
    <div id="article-error" class="article-not-found" style="display:none;">
      <h1>Article not found</h1>
      <p id="article-error-msg">The article you're looking for could not be loaded.</p>
      <a href="./articles.html" class="back-link">← More Articles</a>
    </div>

    <!-- Article content (hidden until loaded) -->
    <div id="article-content-wrapper" class="article-content" style="display:none;">
      <article class="article">

        <div class="article-header">
          <span id="article-kicker" class="article-kicker"></span>
          <h1 id="article-title" class="article-title"></h1>
          <div class="article-meta">
            <time id="article-date" class="article-date"></time>
            <span id="article-read-time" class="read-time"></span>
          </div>
          <div id="article-tags" class="article-tags"></div>
        </div>

        <div id="article-body" class="article-body"></div>

        <footer class="article-footer">
          <a href="./articles.html" class="back-link">← More Articles</a>
        </footer>

      </article>
    </div>

  </main>

  <!-- FOOTER -->

  <script type="module" src="./js/theme.js"></script>
  <script src="./js/vendor/marked.min.js"></script>
  <script type="module" src="./js/article.js"></script>
</body>
</html>
