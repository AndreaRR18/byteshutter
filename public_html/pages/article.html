<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - ByteShutter</title>
</head>
<body>
  <div class="article-page">
    <section class="article-section section">
      <div class="container">
        <div class="article-content">
          <!-- Article content will be dynamically loaded here -->
          <article class="article-full">
            <header class="article-header">
              <h1 class="article-title" id="article-title">Article Title</h1>
              <div class="article-meta">
                <span class="article-date" id="article-date">June 15, 2023</span>
                <span class="article-reading-time" id="article-reading-time">8 min read</span>
              </div>
              <div class="article-tags" id="article-tags">
                <!-- Tags will be inserted here -->
              </div>
            </header>

            <div class="article-body" id="article-body">
              <p>Article content will be loaded dynamically...</p>
            </div>

            <footer class="article-footer">
              <div class="article-actions">
                <button class="btn btn-secondary" onclick="window.history.back()">
                  ← Back to Articles
                </button>
              </div>
            </footer>
          </article>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
