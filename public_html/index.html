<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ByteShutter - Personal blog about web development, iOS development, Swift, SwiftUI, and photography by Andrea Rinaldi">
  <meta name="keywords" content="web development, iOS, Swift, SwiftUI, photography, programming blog">
  <meta name="author" content="Andrea Rinaldi">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="ByteShutter - Tech & Photography Blog">
  <meta property="og:description" content="Articles about web development, iOS development, Swift, and photography">
  <meta property="og:url" content="https://andrearr18.github.io/byteshutter/">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ByteShutter">
  
  <title>ByteShutter</title>
  
  <!-- Theme initialization -->
  <script>
    // Prevent theme flash by setting theme before any rendering
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const theme = savedTheme || systemTheme;
      
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.classList.add(theme);
    })();
  </script>
  
  <!-- Critical CSS -->
  <style>
    :root {
      --color-background: #ffffff;
      --color-text: #333333;
      --color-primary: #4CAF50;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    [data-theme="dark"] {
      --color-background: #1a1a1a;
      --color-text: #f5f5f5;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-family);
      background-color: var(--color-background);
      color: var(--color-text);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    main {
      flex: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header will be loaded here -->
    <header id="header-container"></header>
    
    <!-- Main content -->
    <main id="main-content" tabindex="-1">
      <!-- Page content will be loaded here -->
      <div id="page-content"></div>
    </main>
    
    <!-- Footer will be loaded here -->
    <footer id="footer-container"></footer>
  </div>
  
  <!-- Load CSS -->
  <link rel="stylesheet" href="/assets/css/global.css">
  
  <!-- Load TypeScript -->
  <script type="module" src="/assets/js/main.ts"></script>
  <script type="module" src="/assets/js/router.ts"></script>
  <script type="module" src="/assets/js/theme.ts"></script>
</body>
</html>
